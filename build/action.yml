name: Build Docker Image
description: Build and push docker image
inputs:
  build-dir:
    description: 'Directory to run the build in'
    required: false
    default: ''
  build-args:
    description: 'Newline-separated KEY=VALUE pairs passed to docker build as --build-arg'
    required: false
    default: ''
  build-secrets:
    description: 'Newline-separated id=ENV_VAR pairs passed to docker build as --secret id=<id>,env=<ENV_VAR> (BuildKit)'
    required: false
    default: ''
outputs:
  docker_image:
    description: "Docker image path generated by this action"
    value: ${{ steps.result.outputs.docker_image }}
  docker_image_latest:
    description: "Docker path to latest docker image"
    value: ${{ steps.result.outputs.docker_image_latest }}
  sentry_release:
    description: "Sentry release name"
    value: ${{ steps.result.outputs.sentry_release }}
runs:
  using: composite
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        mask-aws-account-id: false
    - name: Login to Amazon ECR
      id: login-ecr-pf
      uses: aws-actions/amazon-ecr-login@v2
    - name: Build & Push
      shell: bash
      env:
        DOCKER_IMAGE: '${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.AWS_REPOSITORY }}'
        SENTRY_RELEASE: ${{ env.SENTRY_PROJECT }}@${{ env.VERSION }}
        BUILD_ARGS: ${{ inputs.build-args }}
        BUILD_SECRETS: ${{ inputs.build-secrets }}
      working-directory: ${{ inputs.build-dir }}
      run: |
        echo $VERSION > ./public/version.txt

        # Optional, backward-compatible: expand build-args / build-secrets inputs.
        # When an input is empty its array stays empty and expands to zero arguments.
        BUILD_ARG_FLAGS=()
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          BUILD_ARG_FLAGS+=(--build-arg "$line")
        done <<< "$BUILD_ARGS"

        SECRET_FLAGS=()
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          SECRET_FLAGS+=(--secret "id=${line%%=*},env=${line#*=}")
        done <<< "$BUILD_SECRETS"

        # Only opt into BuildKit when build-secrets are requested (--secret needs it).
        # Callers that pass neither input run the exact same `docker build` as before,
        # with the default builder untouched. BUILDX_NO_DEFAULT_ATTESTATIONS keeps the
        # pushed image a plain single-platform manifest (no provenance/SBOM index).
        if [ ${#SECRET_FLAGS[@]} -gt 0 ]; then
          export DOCKER_BUILDKIT=1
          export BUILDX_NO_DEFAULT_ATTESTATIONS=1
        fi

        docker build "${BUILD_ARG_FLAGS[@]}" "${SECRET_FLAGS[@]}" -t $DOCKER_IMAGE:${{ env.VERSION }} .
        docker tag $DOCKER_IMAGE:${{ env.VERSION }} $DOCKER_IMAGE:latest
        docker push $DOCKER_IMAGE --all-tags
        echo "DOCKER_IMAGE=$DOCKER_IMAGE:${{ env.VERSION }}" >> $GITHUB_ENV
        echo "DOCKER_IMAGE_LATEST=$DOCKER_IMAGE:latest" >> $GITHUB_ENV
        echo "SENTRY_RELEASE=$SENTRY_RELEASE" >> $GITHUB_ENV
    - name: Logout of Amazon ECR
      shell: bash
      run: docker logout ${{ steps.login-ecr-pf.outputs.registry }}
    - name: Notify Slack
      uses: justinr636/github-action-slack-notify-build@v1
      if: failure()
      with:
        channel: ${{ env.SLACK_CHANNEL }}
        status: Failed to release
        color: '#dd0000'
    - id: result
      name: Set outputs
      shell: bash
      run: |
        echo "docker_image=${{ env.DOCKER_IMAGE }}" >> $GITHUB_OUTPUT
        echo "docker_image_latest=${{ env.DOCKER_IMAGE_LATEST }}" >> $GITHUB_OUTPUT
        echo "sentry_release=${{ env.SENTRY_RELEASE }}" >> $GITHUB_OUTPUT
